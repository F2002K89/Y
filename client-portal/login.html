<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Client Portal Login — NEFT OIL TRADING</title>
  <link rel="icon" href="../logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Montserrat', sans-serif; }
    .glass { backdrop-filter: saturate(180%) blur(10px); background: rgba(255,255,255,.88); }
    input:focus { outline: none; border-color: #000; box-shadow: 0 0 0 2px rgba(0,0,0,0.08); }
    .tab-active { background: #000; color: #fff; }
    .tab-inactive { background: transparent; color: #555; }
    .fade-in { animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- NAV -->
  <nav class="fixed inset-x-0 top-0 z-50 glass border-b border-black/5">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex h-16 items-center justify-between">
        <a href="../index.html" class="flex items-center gap-2">
          <img src="../logo.png" class="h-9 w-9 object-contain" alt="NEFT logo"/>
          <span class="font-extrabold text-lg">NEFT OIL TRADING</span>
        </a>
        <a href="../index.html" class="text-sm font-medium hover:opacity-70 transition flex items-center gap-1">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
          Back to Website
        </a>
      </div>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="pt-24 pb-16 px-4">
    <div class="max-w-md mx-auto fade-in">

      <!-- Header -->
      <div class="text-center mb-8">
        <img src="../logo.png" class="h-14 w-14 object-contain mx-auto mb-4" alt="NEFT logo"/>
        <h1 class="text-2xl font-extrabold">Client Portal</h1>
        <p class="text-gray-500 text-sm mt-1">NEFT OIL TRADING — Secure Access</p>
      </div>

      <!-- Card -->
      <div class="bg-white rounded-2xl shadow-lg border border-black/5 p-8">

        <!-- Tabs -->
        <div class="flex rounded-lg overflow-hidden border border-black/10 mb-6">
          <button id="tab-login" onclick="switchTab('login')"
            class="tab-active flex-1 py-2.5 text-sm font-semibold transition">Sign In</button>
          <button id="tab-register" onclick="switchTab('register')"
            class="tab-inactive flex-1 py-2.5 text-sm font-semibold transition">Register</button>
        </div>

        <!-- LOGIN FORM -->
        <div id="form-login">
          <div class="space-y-4">
            <div>
              <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1.5">Email Address</label>
              <input id="login-email" type="email" placeholder="you@company.com"
                class="border border-gray-200 rounded-lg px-4 py-3 w-full text-sm transition"/>
            </div>
            <div>
              <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1.5">Password</label>
              <input id="login-pass" type="password" placeholder="••••••••"
                class="border border-gray-200 rounded-lg px-4 py-3 w-full text-sm transition"/>
            </div>
            <div class="flex justify-end">
              <a href="#" class="text-xs text-gray-500 hover:text-black transition">Forgot password?</a>
            </div>
            <button onclick="doLogin()"
              class="w-full bg-black text-white py-3 rounded-lg font-semibold text-sm hover:bg-gray-800 transition mt-1">
              Sign In to Portal
            </button>
          </div>
          <div class="relative my-5">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-100"></div></div>
            <div class="relative text-center"><span class="bg-white px-3 text-xs text-gray-400">New client?</span></div>
          </div>
          <button onclick="switchTab('register')"
            class="w-full border border-black/10 py-3 rounded-lg font-semibold text-sm hover:bg-gray-50 transition">
            Create an Account
          </button>
        </div>

        <!-- REGISTER FORM -->
        <div id="form-register" class="hidden">
          <div class="space-y-4">
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1.5">First Name</label>
                <input id="reg-fname" type="text" placeholder="Ahmed"
                  class="border border-gray-200 rounded-lg px-4 py-3 w-full text-sm transition"/>
              </div>
              <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1.5">Last Name</label>
                <input id="reg-lname" type="text" placeholder="Al Mansouri"
                  class="border border-gray-200 rounded-lg px-4 py-3 w-full text-sm transition"/>
              </div>
            </div>
            <div>
              <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1.5">Company Name</label>
              <input id="reg-company" type="text" placeholder="Your Company LLC"
                class="border border-gray-200 rounded-lg px-4 py-3 w-full text-sm transition"/>
            </div>
            <div>
              <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1.5">Email Address</label>
              <input id="reg-email" type="email" placeholder="you@company.com"
                class="border border-gray-200 rounded-lg px-4 py-3 w-full text-sm transition"/>
            </div>
            <div>
              <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1.5">Phone Number</label>
              <input id="reg-phone" type="tel" placeholder="+971 50 000 0000"
                class="border border-gray-200 rounded-lg px-4 py-3 w-full text-sm transition"/>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1.5">Password</label>
                <input id="reg-pass" type="password" placeholder="••••••••"
                  class="border border-gray-200 rounded-lg px-4 py-3 w-full text-sm transition"/>
              </div>
              <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1.5">Confirm</label>
                <input id="reg-pass2" type="password" placeholder="••••••••"
                  class="border border-gray-200 rounded-lg px-4 py-3 w-full text-sm transition"/>
              </div>
            </div>
            <button onclick="doRegister()"
              class="w-full bg-black text-white py-3 rounded-lg font-semibold text-sm hover:bg-gray-800 transition">
              Create Account
            </button>
          </div>
        </div>

      </div><!-- /card -->

      <p class="text-center text-xs text-gray-400 mt-6">
        © <span id="yr"></span> NEFT OIL TRADING. All rights reserved.
      </p>
    </div>
  </main>

  <script>
    document.getElementById('yr').textContent = new Date().getFullYear();

    function switchTab(t) {
      const loginBtn = document.getElementById('tab-login');
      const regBtn   = document.getElementById('tab-register');
      const loginF   = document.getElementById('form-login');
      const regF     = document.getElementById('form-register');
      if (t === 'login') {
        loginBtn.className = 'tab-active flex-1 py-2.5 text-sm font-semibold transition';
        regBtn.className   = 'tab-inactive flex-1 py-2.5 text-sm font-semibold transition';
        loginF.classList.remove('hidden'); regF.classList.add('hidden');
      } else {
        regBtn.className   = 'tab-active flex-1 py-2.5 text-sm font-semibold transition';
        loginBtn.className = 'tab-inactive flex-1 py-2.5 text-sm font-semibold transition';
        regF.classList.remove('hidden'); loginF.classList.add('hidden');
      }
    }

    function doLogin() {
      const email = document.getElementById('login-email').value.trim();
      const pass  = document.getElementById('login-pass').value.trim();
      if (!email || !pass) { alert('Please enter your email and password.'); return; }
      // Store session and go to dashboard
      sessionStorage.setItem('neft_user', JSON.stringify({ name: email.split('@')[0], email, company: '', since: new Date().toLocaleDateString('en-GB') }));
      window.location.href = 'dashboard.html';
    }

    function doRegister() {
      const fn      = document.getElementById('reg-fname').value.trim();
      const ln      = document.getElementById('reg-lname').value.trim();
      const company = document.getElementById('reg-company').value.trim();
      const email   = document.getElementById('reg-email').value.trim();
      const pass    = document.getElementById('reg-pass').value.trim();
      const pass2   = document.getElementById('reg-pass2').value.trim();
      if (!fn || !ln || !email || !pass) { alert('Please fill in all required fields.'); return; }
      if (pass !== pass2) { alert('Passwords do not match.'); return; }
      sessionStorage.setItem('neft_user', JSON.stringify({ name: fn + ' ' + ln, email, company, since: new Date().toLocaleDateString('en-GB') }));
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
