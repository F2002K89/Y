<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Client Portal Login — NEFT OIL TRADING</title>
  <link rel="icon" href="../logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Montserrat', sans-serif; }
    .glass { backdrop-filter: saturate(180%) blur(10px); background: rgba(255,255,255,.88); }
    input:focus { outline: none; border-color: #000; box-shadow: 0 0 0 2px rgba(0,0,0,0.08); }
    .tab-active   { background: #000; color: #fff; }
    .tab-inactive { background: transparent; color: #555; }
    .fade-in { animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
    .spinner { display: inline-block; width: 15px; height: 15px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- NAV -->
  <nav class="fixed inset-x-0 top-0 z-50 glass border-b border-black/5">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex h-16 items-center justify-between">
        <a href="../index.html" class="flex items-center gap-2">
          <img src="../logo.png" class="h-9 w-9 object-contain" alt="NEFT logo"/>
          <span class="font-extrabold text-lg">NEFT OIL TRADING</span>
        </a>
        <a href="../index.html" class="text-sm font-medium hover:opacity-70 transition flex items-center gap-1">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
          Back to Website
        </a>
      </div>
    </div>
  </nav>

  <main class="pt-24 pb-16 px-4">
    <div class="max-w-md mx-auto fade-in">

      <div class="text-center mb-8">
        <img src="../logo.png" class="h-14 w-14 object-contain mx-auto mb-4" alt="NEFT logo" onerror="this.style.display='none'"/>
        <h1 class="text-2xl font-extrabold">Client Portal</h1>
        <p class="text-gray-500 text-sm mt-1">NEFT OIL TRADING — Secure Access</p>
      </div>

      <!-- Firebase not configured warning -->
      <div id="config-warning" class="hidden mb-4 bg-amber-50 border border-amber-200 rounded-xl p-4">
        <p class="text-xs font-bold text-amber-800 mb-1">⚙️ Firebase Not Configured</p>
        <p class="text-xs text-amber-700 leading-relaxed">Please follow <strong>FIREBASE-SETUP-GUIDE.txt</strong> and add your Firebase credentials to <strong>firebase-config.js</strong>.</p>
      </div>

      <div class="bg-white rounded-2xl shadow-lg border border-black/5 p-8">

        <!-- Tabs -->
        <div class="flex rounded-lg overflow-hidden border border-black/10 mb-6">
          <button id="tab-login" onclick="switchTab('login')"
            class="tab-active flex-1 py-2.5 text-sm font-semibold transition">Sign In</button>
          <button id="tab-register" onclick="switchTab('register')"
            class="tab-inactive flex-1 py-2.5 text-sm font-semibold transition">Register</button>
        </div>

        <!-- ── LOGIN ── -->
        <div id="form-login">
          <div class="space-y-4">
            <div>
              <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1.5">Email Address</label>
              <input id="login-email" type="email" placeholder="you@company.com"
                class="border border-gray-200 rounded-lg px-4 py-3 w-full text-sm transition"/>
            </div>
            <div>
              <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1.5">Password</label>
              <input id="login-pass" type="password" placeholder="••••••••"
                class="border border-gray-200 rounded-lg px-4 py-3 w-full text-sm transition"
                onkeydown="if(event.key==='Enter') doLogin()"/>
            </div>
            <div class="flex justify-end">
              <button onclick="doReset()" class="text-xs text-gray-500 hover:text-black transition">Forgot password?</button>
            </div>
          </div>

          <div id="login-error" class="hidden mt-3 bg-red-50 border border-red-200 rounded-lg p-3 text-xs text-red-700"></div>
          <div id="login-success" class="hidden mt-3 bg-green-50 border border-green-200 rounded-lg p-3 text-xs text-green-700"></div>

          <button id="login-btn" onclick="doLogin()"
            class="w-full bg-black text-white py-3 rounded-lg font-semibold text-sm hover:bg-gray-800 transition mt-4">
            Sign In to Portal
          </button>

          <div class="relative my-5">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-100"></div></div>
            <div class="relative text-center"><span class="bg-white px-3 text-xs text-gray-400">New client?</span></div>
          </div>
          <button onclick="switchTab('register')"
            class="w-full border border-black/10 py-3 rounded-lg font-semibold text-sm hover:bg-gray-50 transition">
            Create an Account
          </button>
        </div>

        <!-- ── REGISTER ── -->
        <div id="form-register" class="hidden">
          <div class="space-y-4">
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1.5">First Name</label>
                <input id="reg-fname" type="text" placeholder="Ahmed"
                  class="border border-gray-200 rounded-lg px-4 py-3 w-full text-sm transition"/>
              </div>
              <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1.5">Last Name</label>
                <input id="reg-lname" type="text" placeholder="Al Mansouri"
                  class="border border-gray-200 rounded-lg px-4 py-3 w-full text-sm transition"/>
              </div>
            </div>
            <div>
              <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1.5">Company Name</label>
              <input id="reg-company" type="text" placeholder="Your Company LLC"
                class="border border-gray-200 rounded-lg px-4 py-3 w-full text-sm transition"/>
            </div>
            <div>
              <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1.5">Phone Number</label>
              <input id="reg-phone" type="tel" placeholder="+971 50 000 0000"
                class="border border-gray-200 rounded-lg px-4 py-3 w-full text-sm transition"/>
            </div>
            <div>
              <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1.5">Email Address</label>
              <input id="reg-email" type="email" placeholder="you@company.com"
                class="border border-gray-200 rounded-lg px-4 py-3 w-full text-sm transition"/>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1.5">Password</label>
                <input id="reg-pass" type="password" placeholder="Min 6 characters"
                  class="border border-gray-200 rounded-lg px-4 py-3 w-full text-sm transition"/>
              </div>
              <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1.5">Confirm</label>
                <input id="reg-pass2" type="password" placeholder="Repeat password"
                  class="border border-gray-200 rounded-lg px-4 py-3 w-full text-sm transition"/>
              </div>
            </div>
          </div>

          <div id="reg-error"   class="hidden mt-3 bg-red-50 border border-red-200 rounded-lg p-3 text-xs text-red-700"></div>
          <div id="reg-success" class="hidden mt-3 bg-green-50 border border-green-200 rounded-lg p-3 text-xs text-green-700"></div>

          <button id="reg-btn" onclick="doRegister()"
            class="w-full bg-black text-white py-3 rounded-lg font-semibold text-sm hover:bg-gray-800 transition mt-4">
            Create Account
          </button>
        </div>

      </div>

      <p class="text-center text-xs text-gray-400 mt-6">
        © <span id="yr"></span> NEFT OIL TRADING. All rights reserved.
      </p>
    </div>
  </main>

  <!-- Firebase SDK v10 (modular via CDN compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script>
    document.getElementById('yr').textContent = new Date().getFullYear();

    // ── Init Firebase ──────────────────────────────
    let auth, db;
    try {
      if (FIREBASE_CONFIG.apiKey === 'YOUR_API_KEY') {
        document.getElementById('config-warning').classList.remove('hidden');
      } else {
        firebase.initializeApp(FIREBASE_CONFIG);
        auth = firebase.auth();
        db   = firebase.firestore();

        // If already logged in, go straight to dashboard
        auth.onAuthStateChanged(user => {
          if (user) window.location.href = 'dashboard.html';
        });
      }
    } catch(e) { console.error('Firebase init error:', e); }

    // ── Tab switch ─────────────────────────────────
    function switchTab(t) {
      document.getElementById('tab-login').className    = (t==='login'    ? 'tab-active' : 'tab-inactive') + ' flex-1 py-2.5 text-sm font-semibold transition';
      document.getElementById('tab-register').className = (t==='register' ? 'tab-active' : 'tab-inactive') + ' flex-1 py-2.5 text-sm font-semibold transition';
      document.getElementById('form-login').classList.toggle('hidden',    t !== 'login');
      document.getElementById('form-register').classList.toggle('hidden', t !== 'register');
    }

    // ── Error messages ─────────────────────────────
    function firebaseError(code) {
      const map = {
        'auth/user-not-found':       'No account found with this email.',
        'auth/wrong-password':       'Incorrect password. Please try again.',
        'auth/invalid-credential':   'Incorrect email or password.',
        'auth/email-already-in-use': 'An account with this email already exists.',
        'auth/weak-password':        'Password must be at least 6 characters.',
        'auth/invalid-email':        'Please enter a valid email address.',
        'auth/too-many-requests':    'Too many attempts. Please wait a moment and try again.',
        'auth/network-request-failed': 'Network error. Please check your connection.'
      };
      return map[code] || 'Something went wrong. Please try again.';
    }

    function showMsg(id, msg, isError) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.remove('hidden');
    }
    function hideMsg(id) { document.getElementById(id).classList.add('hidden'); }

    // ── LOGIN ──────────────────────────────────────
    async function doLogin() {
      if (!auth) { alert('Firebase is not configured yet. See FIREBASE-SETUP-GUIDE.txt'); return; }
      hideMsg('login-error'); hideMsg('login-success');

      const email = document.getElementById('login-email').value.trim();
      const pass  = document.getElementById('login-pass').value;
      if (!email || !pass) { showMsg('login-error', 'Please enter your email and password.'); return; }

      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Signing in…';

      try {
        await auth.signInWithEmailAndPassword(email, pass);
        // onAuthStateChanged will redirect to dashboard
      } catch (err) {
        showMsg('login-error', firebaseError(err.code));
        btn.disabled = false;
        btn.textContent = 'Sign In to Portal';
      }
    }

    // ── REGISTER ───────────────────────────────────
    async function doRegister() {
      if (!auth) { alert('Firebase is not configured yet. See FIREBASE-SETUP-GUIDE.txt'); return; }
      hideMsg('reg-error'); hideMsg('reg-success');

      const fname   = document.getElementById('reg-fname').value.trim();
      const lname   = document.getElementById('reg-lname').value.trim();
      const company = document.getElementById('reg-company').value.trim();
      const phone   = document.getElementById('reg-phone').value.trim();
      const email   = document.getElementById('reg-email').value.trim();
      const pass    = document.getElementById('reg-pass').value;
      const pass2   = document.getElementById('reg-pass2').value;

      if (!fname || !lname)  { showMsg('reg-error', 'Please enter your full name.'); return; }
      if (!email)            { showMsg('reg-error', 'Please enter your email address.'); return; }
      if (!pass)             { showMsg('reg-error', 'Please create a password.'); return; }
      if (pass !== pass2)    { showMsg('reg-error', 'Passwords do not match.'); return; }
      if (pass.length < 6)   { showMsg('reg-error', 'Password must be at least 6 characters.'); return; }

      const btn = document.getElementById('reg-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Creating account…';

      try {
        // 1. Create Firebase Auth user
        const cred = await auth.createUserWithEmailAndPassword(email, pass);

        // 2. Update display name
        await cred.user.updateProfile({ displayName: fname + ' ' + lname });

        // 3. Save full profile to Firestore
        await db.collection('clients').doc(cred.user.uid).set({
          uid:        cred.user.uid,
          firstName:  fname,
          lastName:   lname,
          fullName:   fname + ' ' + lname,
          company:    company,
          phone:      phone,
          email:      email,
          kyc_status: 'Pending',
          orders:     0,
          createdAt:  firebase.firestore.FieldValue.serverTimestamp(),
          registeredVia: 'NEFT Client Portal'
        });

        showMsg('reg-success', 'Account created! Redirecting to your dashboard…', false);
        // onAuthStateChanged will redirect
      } catch (err) {
        showMsg('reg-error', firebaseError(err.code));
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    }

    // ── PASSWORD RESET ─────────────────────────────
    async function doReset() {
      if (!auth) { alert('Firebase is not configured yet.'); return; }
      const email = document.getElementById('login-email').value.trim();
      if (!email) { showMsg('login-error', 'Enter your email address above first.'); return; }
      try {
        await auth.sendPasswordResetEmail(email);
        showMsg('login-success', 'Password reset email sent! Check your inbox.', false);
      } catch (err) {
        showMsg('login-error', firebaseError(err.code));
      }
    }
  </script>
</body>
</html>
